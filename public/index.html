<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超音波ダウジング・レーダー</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #ffffff; 
            margin: 0;
            padding: 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        
        #startBtn {
            padding: 15px 40px; 
            font-size: 1.2rem; 
            font-weight: bold;
            color: white;
            background: #007AFF;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4);
            cursor: pointer;
            margin-top: 50px;
        }

        #indicator { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            background: rgb(0, 50, 255); 
            margin: 50px auto; 
            transition: transform 0.1s ease-out, background 0.1s ease-out, box-shadow 0.1s ease-out;
            box-shadow: 0 0 20px rgba(0, 50, 255, 0.2);
        }

        .status-box {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin: 0 auto;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .status { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .debug { font-family: monospace; color: #aaa; font-size: 0.9rem; }
        
        #radar-ui { display: none; }
    </style>
</head>
<body>
    <h1>Sound Radar</h1>
    <div class="subtitle">文化祭プロトタイプ</div>

    <button id="startBtn">ダウジングを開始する</button>
    
    <div id="radar-ui">
        <div id="indicator"></div>
        
        <div class="status-box">
            <div class="status">信号強度: <span id="val" style="color: #00ff00;">0</span></div>
            <div class="debug">Target: <span id="targetFreq"></span> Hz</div>
            <!--div class="debug">Noise Floor (全体最大): <span id="maxVal">0</span></div-->
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
